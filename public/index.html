<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membres - Code Smart</title>
    <link rel="stylesheet" href="/public/css/style.css">
    </head>
<body class="dashboard-layout">
    <aside class="sidebar">
        <div class="logo">
            <h2>TONTINE MANAGER 💡</h2>
        </div>
        <!-- navigation -->
         <nav>
            <ul>
                <li><a href="">Dashboard</a></li>
                <li><a href="">Membres</a></li>
                <li><a href="">Cycles</a></li>
                <li><a href="">Contributeurs</a></li>
            </ul>
         </nav>
    </aside>

    <!-- le contenu principal -->
     <main class="main-content">
        <header class="page-header">
            <div class="header-title">
                <h1>Gestion des Membres</h1>
                <p>Gérez les profils, statuts et informations de contact de tous les membres actifs</p>
            </div>
            <!-- profil user -->
             <div class="user-profil">
                <span>Admin Boubacar</span>
                <div class="avatar"></div>
             </div>
        </header>
        <!-- recherche et add un membre -->
         <div class="search-add">
            <div class="search-box">
                <input type="text" placeholder="🔍 Rechercher un membre...">
            </div>
            <button class="btn-primary" id="btn-add-member">+ Ajouter un membre</button>
         </div>

         <!-- le tableau des utilisateurs -->
          <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOM COMPLET</th>
                        <th>TELEPHONE</th>
                        <th>DATE <br>INSCRIPTION</br></th>
                        <th>STATUT</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <!-- la list des membres gere par js -->
                 <tbody class="list-members">

                 </tbody>
            </table>
          </div>
     </main>
     <!-- menu cache -->
      <div class="overlay" id="overlay-add-member"></div>

        <div class="side-panel" id="panel-add-member">
            <div class="panel-header">
                <h2>Nouveau Membre</h2>
                <button class="btn-close" id="btn-close-panel">✕</button>
            </div>
            
            <form class="panel-form" id="form-add-member">
                <div class="form-group">
                    <label for="nom">Nom Complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Ex: Jean-Baptiste Koffi" required>
                </div>

                <div class="form-group">
                    <label for="telephone">Numéro de Téléphone</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="+225 07 12 34 56" required>
                </div>

                <div class="panel-footer">
                    <button type="button" class="btn-secondary" id="btn-cancel">Annuler</button>
                    <button type="submit" class="btn-primary">Ajouter le membre</button>
                </div>
            </form>
        </div>
</body>
</html>
